name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  COMPOSE_PROJECT_NAME: hellodjango
  COMPOSE_PROFILES: postgres,redis,web,worker
  SECRET_KEY: insecure_key_for_ci
  DEBUG: false
  ALLOWED_HOSTS: "*"
  POSTGRES_USER: hello
  POSTGRES_PASSWORD: password
  POSTGRES_DB: hello
  REDIS_URL: redis://redis:6379/0
  DOCKER_RESTART_POLICY: no
  DOCKER_WEB_HEALTHCHECK_TEST: /bin/true
  DOCKER_WEB_PORT_FORWARD: 8000
  DOCKER_WEB_VOLUME: ./public_collected:/app/public_collected
  PYTHONDONTWRITEBYTECODE: true
  NODE_ENV: production

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check --diff .

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Lint shell scripts with ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./bin"
          additional_files: "run"

  test:
    name: Unit Tests with Services
    runs-on: ubuntu-latest
    needs: code-quality
    services:
      postgres:
        image: postgres:18.3-trixie
        env:
          POSTGRES_USER: hello
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hello
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6.2-trixie
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: assets/yarn.lock

      - name: Install Node.js dependencies
        working-directory: ./assets
        run: yarn install --frozen-lockfile

      - name: Build JS assets
        working-directory: ./assets
        run: node esbuild.config.mjs

      - name: Build CSS assets
        working-directory: ./assets
        run: mkdir -p ../public/css && DEBUG=0 npx tailwindcss -i css/app.css -o ../public/css/app.css --minify

      - name: Run Django tests
        working-directory: ./src
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: insecure_key_for_ci
          DEBUG: false
          ALLOWED_HOSTS: "*"
          STATICFILES_DIRS: "/home/runner/work/solo-zj-00052-20260414/solo-zj-00052-20260414/public"
          STATIC_ROOT: "/home/runner/work/solo-zj-00052-20260414/solo-zj-00052-20260414/public_collected"
        run: |
          uv run python manage.py collectstatic --no-input
          uv run python manage.py test

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: hellodjango:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_UID=1000
            APP_GID=1000
            DEBUG=false
            NODE_ENV=production

      - name: Verify Docker image
        run: docker images hellodjango:test
