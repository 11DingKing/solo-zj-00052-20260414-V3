{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% block title %}{% endblock %}</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A production ready example Django app that's using Docker and Docker Compose.">

    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script defer src="{% static 'js/app.js' %}"></script>

    {# Generated with: https://realfavicongenerator.net/ #}
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'site.webmanifest' %}">
    <link rel="mask-icon" href="{% static 'safari-pinned-tab.svg' %}" color="#61b9d2">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
  </head>

  <body class="flex flex-col h-screen justify-between">
    <div class="bg-gray-700">
      <div class="max-w-screen-lg mx-auto py-3 px-3 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between flex-wrap">
          <div class="flex-1 flex items-center">
            <span class="flex p-2 rounded-lg bg-gray-900">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </span>
            <p class="ml-3 font-medium text-white truncate">
              Django {{ django_ver }} and Python {{ python_ver }}
            </p>
          </div>
          <div class="flex items-center space-x-4">
            <div class="relative" id="notification-container">
              <button 
                id="notification-bell" 
                class="relative p-2 rounded-lg bg-gray-900 hover:bg-gray-800 transition-colors"
                aria-label="Notifications"
              >
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                </svg>
                <span 
                  id="notification-badge" 
                  class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center hidden"
                >
                  0
                </span>
              </button>
              
              <div 
                id="notification-dropdown" 
                class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg z-50 hidden"
              >
                <div class="p-4 border-b border-gray-200 flex justify-between items-center">
                  <h3 class="font-semibold text-gray-900">Notifications</h3>
                  <button 
                    id="mark-all-read" 
                    class="text-sm text-blue-600 hover:text-blue-800"
                  >
                    Mark all read
                  </button>
                </div>
                <div 
                  id="notification-list" 
                  class="max-h-96 overflow-y-auto"
                >
                  <div class="p-4 text-center text-gray-500">
                    Loading notifications...
                  </div>
                </div>
              </div>
            </div>
            <div class="rounded-md shadow-xs">
              <span class="flex items-center justify-center px-4 py-2 border border-transparent text-sm leading-5 font-medium rounded-md text-white bg-gray-500">
                DEBUG = {{ debug }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <main class="max-w-screen-lg mx-auto mb-auto">
      {% block body %}{% endblock %}
    </main>

    <footer class="text-center mt-6 pb-6 h-10">
      <p class="text-gray-500">
        <a class="border-b mb-1" href="https://github.com/nickjj/docker-django-example">Coded</a>
        with
        <svg class="h-5 w-5 text-red-600 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
        </svg>
        by
        <a class="border-b mb-1" href="https://nickjanetakis.com">Nick Janetakis</a>
      </p>
    </footer>

    <script>
      const getCsrfToken = () => {
        const cookieValue = document.cookie
          .split('; ')
          .find(row => row.startsWith('csrftoken='));
        return cookieValue ? cookieValue.split('=')[1] : '';
      };

      const formatNotificationMessage = (notification) => {
        const actor = notification.actor_username || 'Someone';
        switch (notification.notification_type) {
          case 'comment':
            return `${actor} commented on your task`;
          case 'like':
            return `${actor} liked your task`;
          case 'follow':
            return `${actor} started following you`;
          default:
            return `${actor} did something`;
        }
      };

      const formatTime = (dateString) => {
        const date = new Date(dateString);
        const now = new Date();
        const diff = now - date;
        
        if (diff < 60000) return 'Just now';
        if (diff < 3600000) return `${Math.floor(diff / 60000)} min ago`;
        if (diff < 86400000) return `${Math.floor(diff / 3600000)} hours ago`;
        return date.toLocaleDateString();
      };

      const renderNotification = (notification) => {
        const isRead = notification.is_read;
        return `
          <div 
            class="p-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer notification-item ${isRead ? '' : 'bg-blue-50'}"
            data-id="${notification.id}"
          >
            <div class="flex items-start space-x-3">
              <div class="flex-shrink-0">
                ${notification.notification_type === 'comment' ? `
                  <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                    <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
                    </svg>
                  </div>
                ` : notification.notification_type === 'like' ? `
                  <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center">
                    <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                    </svg>
                  </div>
                ` : `
                  <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center">
                    <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                  </div>
                `}
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm text-gray-900">
                  ${formatNotificationMessage(notification)}
                </p>
                <p class="text-xs text-gray-500 mt-1">
                  ${formatTime(notification.created_at)}
                </p>
              </div>
              ${!isRead ? `
                <div class="w-2 h-2 bg-blue-500 rounded-full flex-shrink-0 mt-2"></div>
              ` : ''}
            </div>
          </div>
        `;
      };

      const renderNotifications = (notifications) => {
        const list = document.getElementById('notification-list');
        if (!notifications || notifications.length === 0) {
          list.innerHTML = `
            <div class="p-8 text-center text-gray-500">
              <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
              </svg>
              <p>No notifications yet</p>
            </div>
          `;
          return;
        }
        list.innerHTML = notifications.map(renderNotification).join('');
      };

      const updateBadge = (count) => {
        const badge = document.getElementById('notification-badge');
        if (count > 0) {
          badge.textContent = count > 99 ? '99+' : count;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }
      };

      const fetchUnreadCount = async () => {
        try {
          const response = await fetch('/api/notifications/unread_count/');
          if (response.ok) {
            const data = await response.json();
            updateBadge(data.unread_count);
          }
        } catch (error) {
          console.error('Error fetching unread count:', error);
        }
      };

      const fetchNotifications = async () => {
        try {
          const response = await fetch('/api/notifications/?page_size=20');
          if (response.ok) {
            const data = await response.json();
            const results = data.results || data;
            renderNotifications(results);
          }
        } catch (error) {
          console.error('Error fetching notifications:', error);
          document.getElementById('notification-list').innerHTML = `
            <div class="p-4 text-center text-gray-500">
              Failed to load notifications
            </div>
          `;
        }
      };

      const markAllRead = async () => {
        try {
          const response = await fetch('/api/notifications/mark_all_read/', {
            method: 'POST',
            headers: {
              'X-CSRFToken': getCsrfToken(),
              'Content-Type': 'application/json',
            },
          });
          if (response.ok) {
            fetchUnreadCount();
            fetchNotifications();
          }
        } catch (error) {
          console.error('Error marking all read:', error);
        }
      };

      const initNotificationSystem = () => {
        const bell = document.getElementById('notification-bell');
        const dropdown = document.getElementById('notification-dropdown');
        const markAllReadBtn = document.getElementById('mark-all-read');

        bell.addEventListener('click', (e) => {
          e.stopPropagation();
          const isHidden = dropdown.classList.contains('hidden');
          dropdown.classList.toggle('hidden');
          if (isHidden) {
            fetchNotifications();
          }
        });

        document.addEventListener('click', (e) => {
          if (!dropdown.contains(e.target) && e.target !== bell) {
            dropdown.classList.add('hidden');
          }
        });

        markAllReadBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          markAllRead();
        });

        fetchUnreadCount();

        setInterval(fetchUnreadCount, 30000);
      };

      document.addEventListener('DOMContentLoaded', initNotificationSystem);
    </script>
  </body>
</html>
